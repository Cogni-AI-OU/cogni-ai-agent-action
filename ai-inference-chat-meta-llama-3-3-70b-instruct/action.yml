---
name: Cogni AI Inference Chat Llama 3.3 70b Instruct
description: Runs AI inference using Meta Llama 3.3 70b Instruct via GitHub Models
inputs:
  agent:
    default: default
    description: Agent to use for system prompt.
    required: false
  enable-github-mcp:
    default: 'true'
    description: >-
      Enable Model Context Protocol integration with GitHub tools.
    required: false
  github-mcp-token:
    description: Token to use for GitHub MCP server.
    required: false
  github-mcp-toolsets:
    default: repos,issues,pull_requests,actions,code_security
    description: Toolsets to enable for GitHub MCP server.
    required: false
  instructions:
    default: ''
    description: Comma-separated list of instructions to load into system prompt.
    required: false
  max-completion-tokens:
    description: The maximum number of tokens to generate
    required: false
  max-tokens:
    default: 16000
    description: The maximum number of tokens to generate (deprecated)
    required: false
  prompt-file:
    description: >-
      Path to a file containing the prompt (supports .txt and .prompt.yml
      formats). If both prompt and prompt-file are provided, prompt-file
      takes precedence.
    required: false
  input:
    description: Template variables in YAML format for .prompt.yml files.
    required: false
  file_input:
    description: Template variables in YAML where values are file paths.
    required: false
  mentions:
    default: /ai
    description: Comma-separated trigger mentions for AI Inference.
    required: false
  mentions_bots:
    default: ''
    description: Com_ma-separated bot mentions for AI Inference.
    required: false
  prompt:
    default: ''
    description: Prompt to pass to the model.
    required: false
  skills:
    default: ''
    description: Comma-separated list of skills to load into system prompt.
    required: false
  system-prompt:
    default: You are a helpful assistant
    description: The system prompt to send to the model.
    required: false
  temperature:
    description: The sampling temperature to use (0-1)
    required: false
  token:
    description: Token to use for inference. Typically the GITHUB_TOKEN secret.
    required: false
  force-run:
    default: 'false'
    description: Whether to force the agent to run regardless of condition checks.
    required: false
  top-p:
    description: The nucleus sampling parameter to use (0-1)
    required: false
  version_agents:
    default: main
    description: Version of cogni-ai-agents to use.
    required: false
  version_instructions:
    default: main
    description: Version of cogni-ai-agent-instructions to use.
    required: false
  version_skills:
    default: main
    description: Version of cogni-ai-agent-skills to use.
    required: false
outputs:
  prompt:
    description: The resolved prompt sent to the model.
    value: ${{ steps.inference.outputs.prompt }}
  response:
    description: The response from the model.
    value: ${{ steps.inference.outputs.response }}
  run:
    description: Whether the agent was executed.
    value: ${{ steps.inference.outputs.run }}
runs:
  using: composite
  steps:
    - name: Run AI Inference
      id: inference
      uses: Cogni-AI-OU/cogni-ai-agent-action/ai-inference@main
      with:
        agent: ${{ inputs.agent }}
        enable-github-mcp: ${{ inputs.enable-github-mcp }}
        github-mcp-token: ${{ inputs.github-mcp-token }}
        github-mcp-toolsets: ${{ inputs.github-mcp-toolsets }}
        instructions: ${{ inputs.instructions }}
        max-completion-tokens: ${{ inputs.max-completion-tokens }}
        max-tokens: ${{ inputs.max-tokens }}
        prompt-file: ${{ inputs.prompt-file }}
        input: ${{ inputs.input }}
        file_input: ${{ inputs.file_input }}
        mentions: ${{ inputs.mentions }}
        mentions_bots: ${{ inputs.mentions_bots }}
        model: meta/llama-3.3-70b-instruct
        prompt: ${{ inputs.prompt }}
        skills: ${{ inputs.skills }}
        system-prompt: ${{ inputs.system-prompt }}
        temperature: ${{ inputs.temperature }}
        token: ${{ inputs.token }}
        force-run: ${{ inputs.force-run }}
        top-p: ${{ inputs.top-p }}
        version_agents: ${{ inputs.version_agents }}
        version_instructions: ${{ inputs.version_instructions }}
        version_skills: ${{ inputs.version_skills }}
