---
# See: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
author: Cogni AI OU
branding:
  color: blue
  icon: cpu
description: Runs Cogni AI agent via OpenCode
inputs:
  agent:
    description: Agent to use.
    required: false
  model:
    default: opencode/gemini-3-flash
    description: Model to use for OpenCode.
    required: false
  mentions:
    default: /co,/cogni,/review
    description: Comma-separated trigger mentions for OpenCode.
    required: false
  opencode-api-key:
    description: API key for OpenCode.
    required: true
  permissions:
    default: |-
      bash:
        '*': deny
        ansible*: allow
        ansible-galaxy*: allow
        ansible-playbook*: allow
        awk*: allow
        continue*: allow
        cp*: allow
        ex*: allow
        gh*: allow
        gh pr review*: allow  # For batched feedback and setting review states
        git*: allow
        hexdump*: allow
        jq*: allow
        ls*: allow
        links*: allow
        mawk*: allow
        pipx*: allow
        pre-commit*: allow
        printf*: allow
        sed*: allow
        set*: allow
        stat*: allow
        time*: allow
        timeout*: allow
        touch*: allow
        true*: allow
        vim*: allow
    description: Permissions configuration for OpenCode.
    required: false
  prompt:
    default: ''
    description: Prompt to pass to the agent.
    required: false
name: Cogni AI Agent
outputs:
  response:
    description: The response from the agent.
    value: ${{ steps.opencode.outputs.response }}
runs:
  using: composite
  steps:
    - name: Check conditions
      id: check
      uses: actions/github-script@v7
      env:
        MENTIONS: ${{ inputs.mentions || '/co,/cogni,/review' }}
      with:
        script: |
          const TRIGGERS = process.env.MENTIONS.split(',').map(t => t.trim());
          const REVIEW_TRIGGERS = TRIGGERS.filter(t => t.includes('review'));
          const BOT_MENTIONS = ['@opencode-agent', '@OpenCode-Agent'];
          const ALLOWED_ROLES = ['COLLABORATOR', 'CONTRIBUTOR', 'MEMBER', 'OWNER'];
          const REVIEW_ROLES = ['COLLABORATOR', 'MEMBER', 'OWNER'];
          const COPILOT_LOGINS = ['Copilot', 'copilot[bot]', 'copilot-swe-agent'];
          function matchesTrigger(body, triggers) {
            if (!body) return false;
            return triggers.some(t => body.endsWith(t) || body.includes(t + ' '));
          }
          function matchesBotMention(body) {
            if (!body) return false;
            return BOT_MENTIONS.some(m => body.includes(m));
          }
          const isBot = context.actor.endsWith('[bot]');
          const eventName = context.eventName;
          let run = false;
          let agent = '';
          if (eventName === 'workflow_dispatch' || eventName === 'workflow_call') {
            run = true;
            agent = 'cogni-ai-architect';
          } else if (eventName === 'issues' && !isBot) {
            const assoc = context.payload.issue?.author_association;
            const body = context.payload.issue?.body;
            if (ALLOWED_ROLES.includes(assoc) && (matchesTrigger(body, TRIGGERS) || matchesBotMention(body))) {
              run = true;
              agent = 'cogni-ai-architect';
            }
          } else if (eventName === 'issue_comment' && !isBot) {
            const assoc = context.payload.comment?.author_association;
            const body = context.payload.comment?.body;
            if (REVIEW_ROLES.includes(assoc) && matchesTrigger(body, REVIEW_TRIGGERS)) {
              run = true;
              agent = 'cogni-ai-reviewer';
            } else if (ALLOWED_ROLES.includes(assoc) && (matchesTrigger(body, TRIGGERS) || matchesBotMention(body))) {
              run = true;
              agent = 'cogni-ai-architect';
            }
          } else if (eventName === 'pull_request_review_comment' && !isBot) {
            const assoc = context.payload.comment?.author_association;
            const body = context.payload.comment?.body;
            if (REVIEW_ROLES.includes(assoc) && matchesTrigger(body, REVIEW_TRIGGERS)) {
              run = true;
              agent = 'cogni-ai-reviewer';
            } else if (ALLOWED_ROLES.includes(assoc) && (matchesTrigger(body, TRIGGERS) || matchesBotMention(body))) {
              run = true;
              agent = 'cogni-ai-architect';
            }
          } else if (eventName === 'pull_request' || eventName === 'pull_request_target') {
            const pr = context.payload.pull_request;
            const assoc = pr?.author_association;
            const login = pr?.user?.login;
            const isAllowed = (!isBot && ['COLLABORATOR', 'MEMBER', 'OWNER'].includes(assoc)) ||
              (COPILOT_LOGINS.includes(login) && assoc === 'CONTRIBUTOR');
            if (isAllowed) {
              run = true;
              agent = 'cogni-ai-architect';
            }
          }
          core.setOutput('run', run ? 'true' : '');
          core.setOutput('agent', agent);
    - name: Cancel stale concurrent runs
      if: steps.check.outputs.run == 'true'
      id: concurrency
      uses: actions/github-script@v7
      with:
        script: |
          const eventName = context.eventName;
          const issueOrPREvents = [
            'issue_comment',
            'issues',
            'pull_request',
            'pull_request_review_comment',
            'pull_request_target',
          ];
          if (!issueOrPREvents.includes(eventName)) {
            core.info('Concurrency check: skipped (not an issue/PR event)');
            return;
          }
          const { data: currentRun } = await github.rest.actions.getWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
          });
          const workflowId = currentRun.workflow_id;
          const groupKey = currentRun.display_title;
          let staleRuns = [];
          for (const status of ['in_progress', 'queued']) {
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              status,
            });
            staleRuns.push(
              ...workflow_runs.filter(
                run => run.id !== context.runId
                  && run.id < context.runId
                  && run.display_title === groupKey
              )
            );
          }
          if (staleRuns.length === 0) {
            core.info('Concurrency check: no stale runs found');
            return;
          }
          core.info(
            `Concurrency check: found ${staleRuns.length} stale run(s) for "${groupKey}"`
          );
          for (const run of staleRuns) {
            try {
              await github.rest.actions.cancelWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              core.info(`Cancelled stale run #${run.run_number} (ID: ${run.id})`);
            } catch (error) {
              core.warning(`Failed to cancel run ${run.id}: ${error.message}`);
            }
          }
    - name: Resolve prompt
      if: steps.check.outputs.run == 'true'
      id: prompt
      shell: bash
      env:
        COMMENT_BODY: >-
          ${{ github.event_name == 'issues' && github.event.issue.body ||
          github.event.comment.body || '' }}
        ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
        PROMPT_INPUT: ${{ inputs.prompt }}
      run: |
        set -euo pipefail
        prompt="${PROMPT_INPUT:-}"
        if [ -z "$prompt" ]; then
          prompt="${COMMENT_BODY:-}"
        fi
        if [ -n "${ISSUE_NUMBER:-}" ]; then
          if [ -n "$prompt" ]; then
            prompt=$(printf 'Related to issue/PR #%s\n\n%s' "$ISSUE_NUMBER" "$prompt")
          else
            prompt="Related to issue/PR #${ISSUE_NUMBER}"
          fi
        fi
        if [ "${GITHUB_RUN_ATTEMPT:-1}" -gt 1 ]; then
          prev_attempt=$(( GITHUB_RUN_ATTEMPT - 1 ))
          previous_build_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${prev_attempt}"
          rerun_note="Note: This is a re-run of a previous build attempt."
          rerun_note+=" Check the previous attempt to understand what was"
          rerun_note+=" already done and continue from where it left off:"
          rerun_note+=" ${previous_build_url}"
          prompt=$(printf '%s\n\n%s' "$prompt" "$rerun_note")
        fi
        EOF_TOKEN="EOF_$(openssl rand -hex 10)"
        {
          echo "prompt<<$EOF_TOKEN"
          printf '%s\n' "$prompt"
          echo "$EOF_TOKEN"
        } >> "$GITHUB_OUTPUT"
    - name: Checkout cogni-ai-agents
      if: steps.check.outputs.run == 'true'
      shell: bash
      run: git clone --depth 1 https://github.com/Cogni-AI-OU/cogni-ai-agents.git ${{ runner.temp }}/.agents
    - name: Checkout cogni-ai-agent-skills
      if: steps.check.outputs.run == 'true'
      shell: bash
      run: git clone --depth 1 https://github.com/Cogni-AI-OU/cogni-ai-agent-skills.git ${{ runner.temp }}/.skills
    - name: Convert permissions to JSON
      if: steps.check.outputs.run == 'true'
      id: permissions
      shell: python
      env:
        PERMISSIONS_YAML: ${{ inputs.permissions }}
      run: |
        import os
        import json
        import yaml
        permissions = yaml.safe_load(os.environ.get('PERMISSIONS_YAML', ''))
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"json={json.dumps(permissions)}\n")
    - name: Run opencode
      if: steps.check.outputs.run == 'true'
      id: opencode
      uses: anomalyco/opencode/github@v1.4.3
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_EVENT_NAME: ${{ github.event_name == 'pull_request_target' && 'pull_request' || github.event_name }}
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        # @see: https://opencode.ai/docs/zen
        # For full list of available models: https://opencode.ai/zen/v1/models
        OPENCODE_CONFIG_CONTENT: |-
          {
            "$schema": "https://opencode.ai/config.json",
            "instructions": [
              "AGENTS-RUNTIME.md",
              "${{ runner.temp }}/.agents/AGENTS.md",
              "${{ runner.temp }}/.skills/AGENTS.md",
              "${{ runner.temp }}/.skills/git/SKILL.md",
              "${{ runner.temp }}/.skills/github/SKILL.md",
              "${{ runner.temp }}/.skills/github-actions/SKILL.md"
            ],
            "agent": {
              "cogni-ai-architect": {
                "mode": "primary",
                "model": "opencode/gemini-3-flash",
                "prompt": "file:${{ runner.temp }}/.agents/cogni-ai-architect/cogni-ai-architect.agent.md",
                "tools": {
                  "write": true,
                  "edit": true,
                  "bash": true
                }
              },
              "cogni-ai-reviewer": {
                "mode": "primary",
                "model": "opencode/gemini-3-flash",
                "prompt": "file:${{ runner.temp }}/.agents/cogni-ai-reviewer/cogni-ai-reviewer.agent.md",
                "tools": {
                  "write": true,
                  "edit": true,
                  "bash": true
                }
              }
            },
            "provider": {
              "opencode": {
                "options": {}
              }
            },
            "mcp": {
              "context7": {
                "type": "remote",
                "url": "https://mcp.context7.com/mcp"
              }
            },
            "tools": {
              "github-triage": false,
              "github-pr-search": false
            }
          }
        # Keep shell permissions aligned with .vscode/settings.json allowlist and in alphabetical order.
        OPENCODE_PERMISSION: ${{ steps.permissions.outputs.json }}
      with:
        agent: ${{ inputs.agent || steps.check.outputs.agent || 'cogni-ai-architect' }}
        mentions: ${{ inputs.mentions || '/co,/cogni,/review' }}
        model: ${{ inputs.model || 'opencode/gemini-3-flash' }}
        prompt: ${{ steps.prompt.outputs.prompt }}
        use_github_token: false
    - name: Write response to summary
      if: always() && steps.opencode.outputs.response != ''
      shell: bash
      env:
        RESPONSE: ${{ steps.opencode.outputs.response }}
      run: |-
        {
          echo "## Agent Response"
          echo ""
          echo "$RESPONSE"
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Print logs
      if: cancelled() || failure()
      shell: bash
      run: grep -v INFO ~/.local/share/opencode/log/* || true
