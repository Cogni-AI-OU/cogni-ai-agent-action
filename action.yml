---
# See: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
author: Cogni AI OU
branding:
  color: blue
  icon: cpu
description: Runs Cogni AI agent via OpenCode
inputs:
  agent:
    default: cogni-ai-architect
    description: Agent to use.
    required: false
  github-token:
    default: ${{ github.token }}
    description: GitHub token.
    required: false
  issue_number:
    description: Issue or PR number this request relates to.
    required: false
  model:
    default: opencode/gpt-5-codex
    description: Model to use for OpenCode.
    required: false
  opencode-api-key:
    description: API key for OpenCode.
    required: true
  prompt:
    default: ''
    description: Prompt to pass to the agent.
    required: false
name: Cogni AI Agent
outputs:
  response:
    description: The response from the agent.
    value: ${{ steps.opencode.outputs.response }}
runs:
  using: composite
  steps:
    - name: Resolve prompt
      id: prompt
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        PROMPT_INPUT: ${{ inputs.prompt }}
      run: |
        set -euo pipefail
        prompt="${PROMPT_INPUT:-}"
        if [ -n "${ISSUE_NUMBER:-}" ]; then
          if [ -n "$prompt" ]; then
            prompt=$(printf 'Related to issue/PR #%s\n\n%s' "$ISSUE_NUMBER" "$prompt")
          else
            prompt="Related to issue/PR #${ISSUE_NUMBER}"
          fi
        fi
        {
          echo 'prompt<<EOF'
          printf '%s\n' "$prompt"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Checkout cogni-ai-agents
      shell: bash
      run: git clone --depth 1 https://github.com/Cogni-AI-OU/cogni-ai-agents.git ${{ runner.temp }}/.agents
    - name: List OpenCode config
      shell: bash
      run: |
        ls -la ~/.config/opencode/* 2>/dev/null || true
        ls -la ${{ runner.temp }}/.agents/cogni-ai-architect/
    - name: Run opencode
      if: github.event.sender.type != 'Bot'
      id: opencode
      uses: anomalyco/opencode/github@v1.4.3
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name == 'pull_request_target' && 'pull_request' || github.event_name }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        # @see: https://opencode.ai/docs/zen
        # For full list of available models: https://opencode.ai/zen/v1/models
        OPENCODE_CONFIG_CONTENT: |-
          {
            "$schema": "https://opencode.ai/config.json",
            "instructions": [
              "AGENTS.md",
              ".github/copilot-instructions.md",
              ".github/skills/AGENTS.md"
            ],
            "agent": {
              "cogni-ai": {
                "mode": "primary",
                "model": "opencode/gpt-5-codex",
                "prompt": "file:${{ runner.temp }}/.agents/cogni-ai-architect/cogni-ai-architect.agent.md",
                "tools": {
                  "write": true,
                  "edit": true,
                  "bash": true
                }
              }
            },
            "provider": {
              "opencode": {
                "options": {}
              }
            },
            "mcp": {
              "context7": {
                "type": "remote",
                "url": "https://mcp.context7.com/mcp"
              }
            },
            "tools": {
              "github-triage": false,
              "github-pr-search": false
            }
          }
        # Keep shell permissions aligned with .vscode/settings.json allowlist and in alphabetical order.
        OPENCODE_PERMISSION: |-
          {
            "bash": {
              "*": "deny",
              "ansible*": "allow",
              "ansible-galaxy*": "allow",
              "ansible-playbook*": "allow",
              "awk*": "allow",
              "continue*": "allow",
              "cp*": "allow",
              "ex*": "allow",
              "gh*": "allow",
              "gh pr review*": "deny",
              "git*": "allow",
              "hexdump*": "allow",
              "jq*": "allow",
              "links*": "allow",
              "mawk*": "allow",
              "pipx*": "allow",
              "pre-commit*": "allow",
              "printf*": "allow",
              "sed*": "allow",
              "set*": "allow",
              "time*": "allow",
              "timeout*": "allow",
              "touch*": "allow",
              "true*": "allow",
              "vim*": "allow"
            }
          }
      with:
        agent: ${{ inputs.agent }}
        model: ${{ inputs.model }}
        prompt: ${{ steps.prompt.outputs.prompt }}
