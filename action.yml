        mentions: ${{ inputs.mentions || '/co,/cogni,/review,/brainstorm' }}
        model: ${{ inputs.model || 'opencode/gemini-3-flash' }}
        opencode-api-key: ${{ inputs.opencode-api-key }}
        permissions: ${{ steps.permissions.outputs.json }}
        prompt: ${{ steps.prompt.outputs.prompt }}
    - name: Write response to summary
      if: always() && steps.opencode.outputs.response != ''
      shell: bash
      env:
        PROMPT: ${{ steps.prompt.outputs.prompt }}
        RESPONSE: ${{ steps.opencode.outputs.response }}
      run: |-
        {
          if [ -n "${PROMPT:-}" ]; then
            echo "## Prompt"
            echo ""
            echo "$PROMPT"
            echo ""
          fi
          echo "## Agent Response"
          echo ""
          echo "$RESPONSE"
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Print logs
      if: cancelled() || failure()
      shell: bash
      run: grep -v INFO ~/.local/share/opencode/log/* || true
