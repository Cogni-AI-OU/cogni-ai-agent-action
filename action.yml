---
# See: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
author: Cogni AI OU
branding:
  color: blue
  icon: cpu
description: Runs Cogni AI agent via OpenCode
env:
  TRIGGER_CO: /co
  TRIGGER_COGNI: /cogni
  TRIGGER_REVIEW: /review
  TRIGGER_AGENT_LOWER: '@opencode-agent'
  TRIGGER_AGENT_MIXED: '@OpenCode-Agent'
inputs:
  agent:
    description: Agent to use.
    required: false
  model:
    default: opencode/gemini-3-flash
    description: Model to use for OpenCode.
    required: false
  mentions:
    default: /co,/cogni,/review
    description: Comma-separated trigger mentions for OpenCode.
    required: false
  opencode-api-key:
    description: API key for OpenCode.
    required: true
  permissions:
    default: |-
      bash:
        '*': deny
        ansible*: allow
        ansible-galaxy*: allow
        ansible-playbook*: allow
        awk*: allow
        continue*: allow
        cp*: allow
        ex*: allow
        gh*: allow
        gh pr review*: allow  # For batched feedback and setting review states
        git*: allow
        hexdump*: allow
        jq*: allow
        ls*: allow
        links*: allow
        mawk*: allow
        pipx*: allow
        pre-commit*: allow
        printf*: allow
        sed*: allow
        set*: allow
        stat*: allow
        time*: allow
        timeout*: allow
        touch*: allow
        true*: allow
        vim*: allow
    description: Permissions configuration for OpenCode.
    required: false
  prompt:
    default: ''
    description: Prompt to pass to the agent.
    required: false
name: Cogni AI Agent
outputs:
  response:
    description: The response from the agent.
    value: ${{ steps.opencode.outputs.response }}
runs:
  using: composite
  steps:
    - name: Prepare environment
      shell: bash
      run: |
        {
          echo "TRIGGER_CO=${TRIGGER_CO}"
          echo "TRIGGER_COGNI=${TRIGGER_COGNI}"
          echo "TRIGGER_REVIEW=${TRIGGER_REVIEW}"
          echo "TRIGGER_AGENT_LOWER=${TRIGGER_AGENT_LOWER}"
          echo "TRIGGER_AGENT_MIXED=${TRIGGER_AGENT_MIXED}"
        } >> "$GITHUB_ENV"
    - name: Check conditions
      id: check
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        ACTOR: ${{ github.actor }}
        AUTHOR_ASSOCIATION_ISSUE: ${{ github.event.issue.author_association }}
        AUTHOR_ASSOCIATION_COMMENT: ${{ github.event.comment.author_association }}
        AUTHOR_ASSOCIATION_PR: ${{ github.event.pull_request.author_association }}
        PR_USER_LOGIN: ${{ github.event.pull_request.user.login }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        ISSUE_BODY: ${{ github.event.issue.body }}
        MENTIONS: ${{ inputs.mentions }}
      run: |
        IS_WORKFLOW_DISPATCH="false"
        IS_WORKFLOW_CALL="false"
        IS_ISSUE="false"
        IS_ISSUE_COMMENT="false"
        IS_PR_REVIEW_COMMENT="false"
        IS_PR="false"
        IS_REVIEW_ISSUE="false"
        IS_REVIEW_PR="false"

        check_association() {
          local assoc="$1"
          case "$assoc" in
            "COLLABORATOR"|"CONTRIBUTOR"|"MEMBER"|"OWNER") return 0 ;;
            *) return 1 ;;
          esac
        }

        check_reviewer_association() {
          local assoc="$1"
          case "$assoc" in
            "COLLABORATOR"|"MEMBER"|"OWNER") return 0 ;;
            *) return 1 ;;
          esac
        }

        check_mentions() {
          local body="$1"
          IFS=',' read -ra ADDR <<< "$MENTIONS"
          for mention in "${ADDR[@]}"; do
            mention="${mention#"${mention%%[![:space:]]*}"}"
            mention="${mention%"${mention##*[![:space:]]}"}"
            if [[ -z "$mention" ]]; then continue; fi
            if [[ "$body" == *"$mention "* ]] || [[ "$body" == *"$mention" ]] || [[ "$body" == "$mention" ]]; then
              return 0
            fi
          done
          if [[ "$body" == *"$TRIGGER_AGENT_LOWER"* ]] || [[ "$body" == *"$TRIGGER_AGENT_MIXED"* ]]; then
            return 0
          fi
          return 1
        }

        check_review_mention() {
          local body="$1"
          if [[ "$body" == *"$TRIGGER_REVIEW "* ]] || [[ "$body" == *"$TRIGGER_REVIEW" ]] || [[ "$body" == "$TRIGGER_REVIEW" ]]; then
            return 0
          fi
          return 1
        }

        if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
          IS_WORKFLOW_DISPATCH="true"
        elif [[ "$EVENT_NAME" == "workflow_call" ]]; then
          IS_WORKFLOW_CALL="true"
        elif [[ "$ACTOR" != *"[bot]" ]]; then
          if [[ "$EVENT_NAME" == "issues" ]]; then
            if check_association "$AUTHOR_ASSOCIATION_ISSUE" && check_mentions "$ISSUE_BODY"; then
              IS_ISSUE="true"
            fi
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            if check_reviewer_association "$AUTHOR_ASSOCIATION_COMMENT" && check_review_mention "$COMMENT_BODY"; then
              IS_REVIEW_ISSUE="true"
            elif check_association "$AUTHOR_ASSOCIATION_COMMENT" && check_mentions "$COMMENT_BODY"; then
              IS_ISSUE_COMMENT="true"
            fi
          elif [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            if check_reviewer_association "$AUTHOR_ASSOCIATION_COMMENT" && check_review_mention "$COMMENT_BODY"; then
              IS_REVIEW_PR="true"
            elif check_association "$AUTHOR_ASSOCIATION_COMMENT" && check_mentions "$COMMENT_BODY"; then
              IS_PR_REVIEW_COMMENT="true"
            fi
          elif [[ "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "pull_request_target" ]]; then
            if check_association "$AUTHOR_ASSOCIATION_PR"; then
              IS_PR="true"
            fi
          fi
        fi

        if [[ "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "pull_request_target" ]]; then
           if [[ "$PR_USER_LOGIN" == "Copilot" || "$PR_USER_LOGIN" == "copilot[bot]" || "$PR_USER_LOGIN" == "copilot-swe-agent" ]] && [[ "$AUTHOR_ASSOCIATION_PR" == "CONTRIBUTOR" ]]; then
             IS_PR="true"
           fi
        fi

        if [ "$IS_REVIEW_ISSUE" == "true" ] || \
           [ "$IS_REVIEW_PR" == "true" ]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "agent=cogni-ai-reviewer" >> "$GITHUB_OUTPUT"
        elif [ "$IS_WORKFLOW_DISPATCH" == "true" ] || \
             [ "$IS_WORKFLOW_CALL" == "true" ] || \
             [ "$IS_ISSUE" == "true" ] || \
             [ "$IS_ISSUE_COMMENT" == "true" ] || \
             [ "$IS_PR_REVIEW_COMMENT" == "true" ] || \
             [ "$IS_PR" == "true" ]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "agent=cogni-ai-architect" >> "$GITHUB_OUTPUT"
        fi
    - name: Resolve prompt
      if: steps.check.outputs.run == 'true'
      id: prompt
      shell: bash
      env:
        COMMENT_BODY: >-
          ${{ github.event_name == 'issues' && github.event.issue.body ||
          github.event.comment.body || '' }}
        ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
        PROMPT_INPUT: ${{ inputs.prompt }}
      run: |
        set -euo pipefail
        prompt="${PROMPT_INPUT:-}"
        if [ -z "$prompt" ]; then
          prompt="${COMMENT_BODY:-}"
        fi
        if [ -n "${ISSUE_NUMBER:-}" ]; then
          if [ -n "$prompt" ]; then
            prompt=$(printf 'Related to issue/PR #%s\n\n%s' "$ISSUE_NUMBER" "$prompt")
          else
            prompt="Related to issue/PR #${ISSUE_NUMBER}"
          fi
        fi
        if [ "${GITHUB_RUN_ATTEMPT:-1}" -gt 1 ]; then
          prev_attempt=$(( GITHUB_RUN_ATTEMPT - 1 ))
          previous_build_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${prev_attempt}"
          rerun_note="Note: This is a re-run of a previous build attempt."
          rerun_note+=" Check the previous attempt to understand what was"
          rerun_note+=" already done and continue from where it left off:"
          rerun_note+=" ${previous_build_url}"
          prompt=$(printf '%s\n\n%s' "$prompt" "$rerun_note")
        fi
        {
          echo 'prompt<<EOF'
          printf '%s\n' "$prompt"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Checkout cogni-ai-agents
      if: steps.check.outputs.run == 'true'
      shell: bash
      run: git clone --depth 1 https://github.com/Cogni-AI-OU/cogni-ai-agents.git ${{ runner.temp }}/.agents
    - name: Checkout cogni-ai-agent-skills
      if: steps.check.outputs.run == 'true'
      shell: bash
      run: git clone --depth 1 https://github.com/Cogni-AI-OU/cogni-ai-agent-skills.git ${{ runner.temp }}/.skills
    - name: Convert permissions to JSON
      if: steps.check.outputs.run == 'true'
      id: permissions
      shell: python
      env:
        PERMISSIONS_YAML: ${{ inputs.permissions }}
      run: |
        import os
        import json
        import yaml
        permissions = yaml.safe_load(os.environ.get('PERMISSIONS_YAML', ''))
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"json={json.dumps(permissions)}\n")
    - name: Run opencode
      if: steps.check.outputs.run == 'true'
      id: opencode
      uses: anomalyco/opencode/github@v1.4.3
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_EVENT_NAME: ${{ github.event_name == 'pull_request_target' && 'pull_request' || github.event_name }}
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        # @see: https://opencode.ai/docs/zen
        # For full list of available models: https://opencode.ai/zen/v1/models
        OPENCODE_CONFIG_CONTENT: |-
          {
            "$schema": "https://opencode.ai/config.json",
            "instructions": [
              "AGENTS-RUNTIME.md",
              "${{ runner.temp }}/.agents/AGENTS.md",
              "${{ runner.temp }}/.skills/AGENTS.md"
            ],
            "agent": {
              "cogni-ai-architect": {
                "mode": "primary",
                "model": "opencode/gemini-3-flash",
                "prompt": "file:${{ runner.temp }}/.agents/cogni-ai-architect/cogni-ai-architect.agent.md",
                "tools": {
                  "write": true,
                  "edit": true,
                  "bash": true
                }
              },
              "cogni-ai-reviewer": {
                "mode": "primary",
                "model": "opencode/gemini-3-flash",
                "prompt": "file:${{ runner.temp }}/.agents/cogni-ai-reviewer/cogni-ai-reviewer.agent.md",
                "tools": {
                  "write": true,
                  "edit": true,
                  "bash": true
                }
              }
            },
            "provider": {
              "opencode": {
                "options": {}
              }
            },
            "mcp": {
              "context7": {
                "type": "remote",
                "url": "https://mcp.context7.com/mcp"
              }
            },
            "tools": {
              "github-triage": false,
              "github-pr-search": false
            }
          }
        # Keep shell permissions aligned with .vscode/settings.json allowlist and in alphabetical order.
        OPENCODE_PERMISSION: ${{ steps.permissions.outputs.json }}
      with:
        agent: ${{ inputs.agent || steps.check.outputs.agent || 'cogni-ai-architect' }}
        mentions: ${{ inputs.mentions || '/co,/cogni,/review' }}
        model: ${{ inputs.model || 'opencode/gemini-3-flash' }}
        prompt: ${{ steps.prompt.outputs.prompt }}
        use_github_token: false
