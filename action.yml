                "disable": true,
                "ignore_instructions": true
              }
            },
            "experimental": {
              "batch_tool": true
            },
            "instructions": [
              ${{ steps.prompt.outputs.has_agents == 'true' && '"AGENTS.md",' || '' }}
              "${{ github.action_path }}/AGENTS-RUNTIME.md",
              "${{ runner.temp }}/.agents/AGENTS-RUNTIME.md",
              "${{ runner.temp }}/.agents/AGENTS.mmd",
              "${{ runner.temp }}/.agents/CONSTRAINTS.mzn",
              "${{ runner.temp }}/.agents/FLOWS.mmd",
