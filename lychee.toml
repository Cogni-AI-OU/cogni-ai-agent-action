# Lychee configuration
# See: https://github.com/lycheeverse/lychee#configuration-file

# Accept 405 Method Not Allowed as a valid status code
# Some servers (like mcp.context7.com) return 405 for HEAD requests
accept = [200, 206, 405]

# Max retries for a link
retry_count = 3

# Max time for a request
timeout = 10
