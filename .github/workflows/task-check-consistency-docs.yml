---
name: Task - Check Consistency Docs
on:
  workflow_dispatch:
jobs:
  cogni-ai:
    name: Check Consistency Docs
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
      - uses: actions/setup-python@v6.1.0
        with:
          cache: pip
          cache-dependency-path: .devcontainer/requirements.txt
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r .devcontainer/requirements.txt pre-commit
      - name: Read prompt
        id: read-prompt
        run: |
          {
            PROMPT=$(cat .github/prompts/task-check-consistency-docs.prompt.md)
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "prompt<<$EOF"
            echo "$PROMPT"
            echo "$EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Run Cogni AI Agent
        uses: ./
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          agent: cogni-ai-architect
          model: opencode/gemini-3-flash
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          prompt: ${{ steps.read-prompt.outputs.prompt }}
