---
name: Task - Update Docs
on:
  workflow_dispatch:
jobs:
  cogni-ai:
    name: Update Docs
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      models: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
      - uses: actions/setup-python@v6.1.0
        with:
          cache: ${{ hashFiles('.devcontainer/requirements.txt', '**/pyproject.toml') != '' && 'pip' || '' }}
          cache-dependency-path: |
            .devcontainer/requirements.txt
            **/pyproject.toml
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pre-commit
          if [ -f .devcontainer/requirements.txt ]; then
            pip install -r .devcontainer/requirements.txt
          fi
      - name: Read prompt
        id: read-prompt
        run: |
          {
            PROMPT=$(cat .github/prompts/task-update-docs.prompt.md)
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "prompt<<$EOF"
            echo "$PROMPT"
            echo "$EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Run Cogni AI Agent
        uses: ./
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          agent: cogni-ai-docs-editor
          model: opencode/deepseek-v4-flash-free
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          prompt: ${{ steps.read-prompt.outputs.prompt }}
