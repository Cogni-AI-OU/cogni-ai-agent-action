---
# AI Inference Test workflow — tests the local ai-inference action.
# Triggered on push.
name: AI Inference Test
run-name: 'Agent on #${{ github.event.issue.number || github.event.pull_request.number || github.event.discussion.number || github.run_id }}'
on:
  push:
    paths:
      - '.github/workflows/ai-inference-test.yml'
      - 'ai-inference/action.yml'
  pull_request:
    paths:
      - '.github/workflows/ai-inference-test.yml'
      - 'ai-inference/action.yml'
jobs:
  test:
    name: AI Inference Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run AI Inference
        uses: ./ai-inference
        with:
          agent: default
          model: openai/gpt-5-mini
          prompt: Count to 10.
          token: ${{ secrets.GITHUB_TOKEN }}
