---
# OpenCode Agent Local workflow — runs the local composite action (./opencode/action.yml) as a wrapper for OpenCode.
# Triggered by /oc, /opencode, or /review commands in comments, or manually via workflow_dispatch/workflow_call.
# Note: Keep keys and envs in alphabetical order.
name: OpenCode Agent Local
run-name: >-
  ${{
    format(
      'Agent on #{0}',
      github.event.issue.number
      || github.event.pull_request.number
      || github.event.discussion.number
      || github.run_id
    )
  }}
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited
  discussion:
    types:
      - created
      - edited
      - answered
  discussion_comment:
    types:
      - created
      - edited
  issues:
    types:
      - opened
      - edited
  workflow_call:
    inputs:
      agent:
        default: ''
        description: Agent to use.
        required: false
        type: string
      model:
        default: ${{ vars.OPENCODE_MODEL_DEFAULT || 'opencode/gemini-3-flash' }}
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        default: ''
        description: Custom prompt to override the default prompt
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        default: ''
        description: Agent to use.
        required: false
        type: string
      model:
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-1
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/glm-4.6
          - opencode/glm-4.7-free
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.1
          - opencode/gpt-5.1-codex
          - opencode/gpt-5.1-codex-max
          - opencode/gpt-5.1-codex-mini
          - opencode/gpt-5.2
          - opencode/gpt-5.2-codex
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/gpt-5.4-pro
          - opencode/grok-code
          - opencode/kimi-k2
          - opencode/kimi-k2-thinking
          - opencode/kimi-k2.5
          - opencode/minimax-m2.1-free
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3.6-plus
          - opencode/qwen3.5-plus
          # Grok models (xAI)
          - xai/grok-4-1-fast-non-reasoning  # Fast responses, 2M context
          - xai/grok-4-1-fast-reasoning  # Tool-calling + reasoning, 2M context
          - xai/grok-4.20-0309-non-reasoning  # Flagship, 2M context
          - xai/grok-4.20-0309-reasoning  # Flagship + reasoning, 2M context
          - xai/grok-code-fast-1  # Agentic coding + reasoning, 256K context
        required: false
        type: choice
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        default: ''
# Prevent concurrent runs on the same branch to avoid push conflicts.
# When a new run is triggered, it will queue until the previous pending run completes.
# On the default branch each run gets a unique group (github.run_id) so runs can
# proceed in parallel, since each one branches off to its own new branch.
# See: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  cancel-in-progress: false
  group: >-
    opencode-${{
      github.event.issue.number
      || github.event.pull_request.number
      || github.event.discussion.number
      || (github.ref_name != github.event.repository.default_branch && github.ref)
      || github.run_id
    }}
env:
  OPENCODE_AGENT_DEFAULT: ''
  OPENCODE_MODEL_DEFAULT: opencode/gemini-3-flash
jobs:
  opencode:
    name: OpenCode Agent Local
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body || '', '/') ||
          contains(github.event.issue.body || '', '@')
        )
      ) ||
      (
        github.event_name == 'discussion' &&
        (
          contains(github.event.discussion.body || '', '/') ||
          contains(github.event.discussion.body || '', '@')
        )
      ) ||
      contains(github.event.comment.body || '', '/') ||
      contains(github.event.comment.body || '', '@')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      discussions: write
      id-token: write  # Needed so opencode can request an OIDC token for GitHub API calls
      issues: write
      pull-requests: write
    steps:
      # See: <https://github.com/actions/github-script>
      - name: Check for active Cogni run
        id: cross-workflow-guard
        uses: actions/github-script@v7
        with:
          script: |
            const subjectNumber =
              context.payload.issue?.number
              ?? context.payload.pull_request?.number
              ?? context.payload.discussion?.number;
            if (!subjectNumber) {
              core.info('Cross-workflow guard: skipped (no issue, PR, or discussion number)');
              core.setOutput('skip', 'false');
              return;
            }
            const displayTitle = 'Agent on ' + '#' + subjectNumber;
            const threadLabel = `#${subjectNumber}`;
            const activeRuns = [];
            for (const status of ['in_progress', 'queued']) {
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                per_page: 100,
                repo: context.repo.repo,
                status,
                workflow_id: 'cogni-ai-agent-local.yml',
              });
              activeRuns.push(
                ...workflow_runs.filter(
                  run => run.id !== context.runId
                    && run.display_title === displayTitle
                )
              );
            }
            if (activeRuns.length > 0) {
              const ids = activeRuns.map(run => run.id).join(', ');
              core.notice(
                `Cross-workflow guard: skipping because Cogni run(s) are already active ` +
                `for ${threadLabel} (IDs: ${ids})`
              );
              core.setOutput('skip', 'true');
              return;
            }
            core.info(`Cross-workflow guard: no active Cogni runs found for ${threadLabel}`);
            core.setOutput('skip', 'false');
      - name: Skip because Cogni run is active
        if: ${{ steps.cross-workflow-guard.outputs.skip == 'true' }}
        run: echo "Skipping OpenCode Agent Local because Cogni AI Agent Local is already active for this thread."
      # See: <https://github.com/actions/checkout>
      - uses: actions/checkout@v6
        if: ${{ steps.cross-workflow-guard.outputs.skip != 'true' }}
        with:
          persist-credentials: false  # Prevents duplicate Authorization header
          ref: >-
            ${{
              (
                github.event_name == 'issue_comment' &&
                github.event.issue.pull_request &&
                format('refs/pull/{0}/head', github.event.issue.number)
              ) ||
              (
                github.event_name == 'pull_request_review_comment' &&
                format('refs/pull/{0}/head', github.event.pull_request.number)
              ) ||
              github.ref
            }}
      - uses: actions/cache@v5.0.1
        if: ${{ steps.cross-workflow-guard.outputs.skip != 'true' }}
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit|
      - uses: actions/setup-python@v6.1.0
        if: ${{ steps.cross-workflow-guard.outputs.skip != 'true' }}
        with:
          cache: pip
          cache-dependency-path: .devcontainer/requirements.txt
          python-version: '3.12'
      - name: Install pre-commit
        if: ${{ steps.cross-workflow-guard.outputs.skip != 'true' }}
        run: pip install pre-commit
      - name: Cache installed dependencies
        id: cache-dependencies
        if: ${{ steps.cross-workflow-guard.outputs.skip != 'true' }}
        uses: actions/cache@v5.0.1
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-pip-${{ env.pythonLocation }}-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install dependencies
        if: >-
          ${{
            steps.cross-workflow-guard.outputs.skip != 'true'
            && steps.cache-dependencies.outputs.cache-hit != 'true'
          }}
        run: pip install -r .devcontainer/requirements.txt
      - name: Run OpenCode Agent Local
        id: opencode
        if: ${{ steps.cross-workflow-guard.outputs.skip != 'true' }}
        uses: ./opencode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          agent: >-
            ${{ inputs.agent || '' }}
          model: ${{ inputs.model || env.OPENCODE_MODEL_DEFAULT }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          prompt: >-
            ${{
              inputs.prompt
              || github.event.comment.body
              || github.event.issue.body
              || github.event.pull_request.body
              || github.event.discussion.body
            }}
      - name: Annotate prompt and output
        if: ${{ steps.cross-workflow-guard.outputs.skip != 'true' }}
        env:
          OPENCODE_PROMPT: ${{ steps.opencode.outputs.prompt }}
          OPENCODE_OUTPUT: ${{ steps.opencode.outputs.response }}
        run: |
          set -euo pipefail
          escape() {
            local value="$1"
            value=${value//'%'/'%25'}
            value=${value//$'\r'/'%0D'}
            value=${value//$'\n'/'%0A'}
            printf '%s' "$value"
          }
          echo "::notice title=OpenCode Agent Local prompt::$(escape "$OPENCODE_PROMPT")"
          echo "::notice title=OpenCode Agent Local output::$(escape "${OPENCODE_OUTPUT:-}")"
      - name: Print logs
        if: ${{ (cancelled() || failure()) && steps.cross-workflow-guard.outputs.skip != 'true' }}
        run: grep -v INFO ~/.local/share/opencode/log/* || true
