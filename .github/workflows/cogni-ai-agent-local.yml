---
# Cogni AI Agent Local workflow — runs the local composite action (./action.yml) as a wrapper for OpenCode.
# Triggered by /co, /cogni, /review, or /brainstorm commands in comments,
# or manually via workflow_dispatch/workflow_call.
# Note: Keep keys and envs in alphabetical order.
name: Cogni AI Agent Local
run-name: 'Agent on #${{ github.event.issue.number || github.event.pull_request.number || github.event.discussion.number || github.run_id }}'
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited
  discussion:
    types:
      - created
      - edited
      - answered
  discussion_comment:
    types:
      - created
      - edited
  issues:
    types:
      - opened
      - edited
  workflow_call:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        required: false
        type: string
      model:
        default: ${{ vars.OPENCODE_MODEL_DEFAULT || 'opencode/gemini-3-flash' }}
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        default: ''
        description: Custom prompt to override the default prompt
        required: false
        type: string
      version_agents:
        default: main
        description: Version of cogni-ai-agents to use.
        required: false
        type: string
      version_instructions:
        default: main
        description: Version of cogni-ai-agent-instructions to use.
        required: false
        type: string
      version_skills:
        default: main
        description: Version of cogni-ai-agent-skills to use.
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        options:
          - cogni-ai-architect
          - cogni-ai-brain-ops
          - cogni-ai-code-reviewer
          - cogni-ai-devops
          - cogni-ai-plan-reviewer
          - default
        required: false
        type: choice
      model:
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-1
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/glm-4.6
          - opencode/glm-4.7-free
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.1
          - opencode/gpt-5.1-codex
          - opencode/gpt-5.1-codex-max
          - opencode/gpt-5.1-codex-mini
          - opencode/gpt-5.2
          - opencode/gpt-5.2-codex
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/gpt-5.4-pro
          - opencode/grok-code
          - opencode/kimi-k2
          - opencode/kimi-k2-thinking
          - opencode/kimi-k2.5
          - opencode/minimax-m2.1-free
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3.6-plus
          - opencode/qwen3.5-plus
          # Grok models (xAI)
          - xai/grok-4-1-fast-non-reasoning  # Fast responses, 2M context
          - xai/grok-4-1-fast-reasoning  # Tool-calling + reasoning, 2M context
          - xai/grok-4.20-0309-non-reasoning  # Flagship, 2M context
          - xai/grok-4.20-0309-reasoning  # Flagship + reasoning, 2M context
          - xai/grok-code-fast-1  # Agentic coding + reasoning, 256K context
        required: false
        type: choice
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        default: ''
# Prevent concurrent runs on the same branch to avoid push conflicts.
# When a new run is triggered, it will queue until the previous pending run completes.
# On the default branch each run gets a unique group (github.run_id) so runs can
# proceed in parallel, since each one branches off to its own new branch.
# See: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  cancel-in-progress: false
  group: >-
    opencode-${{
      github.event.issue.number
      || github.event.pull_request.number
      || github.event.discussion.number
      || (github.ref_name != github.event.repository.default_branch && github.ref)
      || github.run_id
    }}
env:
  GITHUB_REF_RESOLVED: >-
    ${{
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        format('refs/pull/{0}/head', github.event.issue.number)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        format('refs/pull/{0}/head', github.event.pull_request.number)
      ) ||
      github.ref
    }}
  OPENCODE_AGENT_DEFAULT: cogni-ai-architect
  OPENCODE_MODEL_DEFAULT: opencode/gemini-3-flash
jobs:
  cogni-ai:
    name: Cogni AI Agent Local
    # Note: These are pre-run conditions, actual trigger conditions are defined within the action it-self.
    if: |
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.event.sender.type != 'Bot') &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'workflow_call' ||
        contains(github.event.comment.body || github.event.issue.body || github.event.pull_request.body || github.event.discussion.body || '', '/') ||
        contains(github.event.comment.body || github.event.issue.body || github.event.pull_request.body || github.event.discussion.body || '', '@')
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      discussions: read
      id-token: write  # Needed so opencode can request an OIDC token for GitHub API calls
      issues: write
      packages: read
      pull-requests: write
    steps:
      # See: <https://github.com/actions/checkout>
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents duplicate Authorization header
          ref: ${{ env.GITHUB_REF_RESOLVED }}
      - uses: actions/cache@v5.0.1
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit|
      - uses: actions/setup-python@v6.1.0
        with:
          cache: pip
          cache-dependency-path: .devcontainer/requirements.txt
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Cache installed dependencies
        id: cache-dependencies
        uses: actions/cache@v5.0.1
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-pip-${{ env.pythonLocation }}-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: pip install -r .devcontainer/requirements.txt
      - name: Run Cogni AI Agent Local
        id: cogni-ai
        uses: ./
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          agent: >-
            ${{ inputs.agent || '' }}
          model: ${{ inputs.model || env.OPENCODE_MODEL_DEFAULT }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          prompt: ${{ inputs.prompt || github.event.comment.body || github.event.issue.body || github.event.pull_request.body || github.event.discussion.body }}
          version_agents: ${{ inputs.version_agents || 'main' }}
          version_instructions: ${{ inputs.version_instructions || 'main' }}
          version_skills: ${{ inputs.version_skills || 'main' }}
      - name: Annotate prompt and output
        env:
          COGNI_AI_PROMPT: ${{ steps.cogni-ai.outputs.prompt }}
          COGNI_AI_OUTPUT: ${{ steps.cogni-ai.outputs.response }}
        run: |
          set -euo pipefail
          escape() {
            local value="$1"
            value=${value//'%'/'%25'}
            value=${value//$'\r'/'%0D'}
            value=${value//$'\n'/'%0A'}
            printf '%s' "$value"
          }
          echo "::notice title=Cogni AI Agent Local prompt::$(escape "$COGNI_AI_PROMPT")"
          echo "::notice title=Cogni AI Agent Local output::$(escape "${COGNI_AI_OUTPUT:-}")"
      - name: Print logs
        if: cancelled() || failure()
        run: grep -v INFO ~/.local/share/opencode/log/* || true
  review:
    name: Cogni AI Agent Review Local
    needs: cogni-ai
    if: always() && needs.cogni-ai.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.GITHUB_REF_RESOLVED }}
      - name: Print and extract previous job logs
        id: extract-logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JOB_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --jq '.jobs[] | select(.name == "Cogni AI Agent Local") | .id')
          if [ -z "$JOB_ID" ]; then
            echo "Job ID not found for 'Cogni AI Agent Local'"
            exit 1
          fi
          gh api "repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs" | awk '/PROMPT:/,/Post job cleanup/ { $1=""; print substr($0,2); found=1 } END { if (!found) print "No logs found between markers." }' | tee agent.log
      - name: Prepare review prompt
        id: prepare-prompt
        run: |
          python3 -c "
          import os
          template_path = '.github/prompts/agent-log-analysis.prompt.yml'
          logs_path = 'agent.log'
          with open(template_path, 'r') as f: template = f.read()
          with open(logs_path, 'r') as f: logs = f.read()
          indented_logs = '\n'.join([('      ' + l if i > 0 else l) for i, l in enumerate(logs.splitlines())])
          content = template.replace('{{logs}}', indented_logs)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('prompt<<EOF\n')
              f.write(content)
              f.write('\nEOF\n')
          "
      - name: Run Cogni AI Agent Review Local
        id: cogni-ai-reviewer
        if: ${{ false }}
        uses: ./
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          agent: cogni-ai-agent-auditor
          model: ${{ inputs.model || env.OPENCODE_MODEL_DEFAULT }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          prompt: ${{ steps.prepare-prompt.outputs.prompt }}
          version_agents: ${{ inputs.version_agents || 'main' }}
          version_instructions: ${{ inputs.version_instructions || 'main' }}
          version_skills: ${{ inputs.version_skills || 'main' }}
      - name: Post summary to GITHUB_STEP_SUMMARY
        if: steps.cogni-ai-reviewer.outputs.response != ''
        run: |-
          {
            echo "## Agent Session Summary"
            echo ""
            cat << 'EOF'
          ${{ steps.cogni-ai-reviewer.outputs.response }}
          EOF
          } >> "$GITHUB_STEP_SUMMARY"
