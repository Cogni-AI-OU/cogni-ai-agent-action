---
# AI Inference Local workflow — tests the local ai-inference action.
# Triggered by /ai command in comments, or manually via workflow_dispatch.
# Note: Keep keys and envs in alphabetical order.
name: AI Inference Local
run-name: 'Agent on #${{ github.event.issue.number || github.event.pull_request.number || github.event.discussion.number || github.run_id }}'
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited
  discussion:
    types:
      - created
      - edited
      - answered
  discussion_comment:
    types:
      - created
      - edited
  issues:
    types:
      - opened
      - edited
  workflow_dispatch:
    inputs:
      model:
        default: openai/gpt-5-mini
        description: Model to use for inference
        required: false
        options:
          - ai21-labs/jamba-1.5-large
          - cohere/command-a
          - cohere/command-r-08-2024
          - cohere/command-r-plus-08-2024
          - deepseek/deepseek-r1
          - deepseek/deepseek-r1-0528
          - deepseek/deepseek-v3-0324
          - meta/llama-3.2-11b-vision-instruct
          - meta/llama-3.2-90b-vision-instruct
          - meta/llama-3.3-70b-instruct
          - meta/llama-4-maverick-17b-128e-instruct-fp8
          - meta/llama-4-scout-17b-16e-instruct
          - meta/meta-llama-3.1-405b-instruct
          - meta/meta-llama-3.1-8b-instruct
          - microsoft/mai-ds-r1
          - microsoft/phi-4
          - microsoft/phi-4-mini-instruct
          - microsoft/phi-4-mini-reasoning
          - microsoft/phi-4-multimodal-instruct
          - microsoft/phi-4-reasoning
          - mistral-ai/codestral-2501
          - mistral-ai/ministral-3b
          - mistral-ai/mistral-medium-2505
          - mistral-ai/mistral-small-2503
          - openai/gpt-4.1
          - openai/gpt-4.1-mini
          - openai/gpt-4.1-nano
          - openai/gpt-4o
          - openai/gpt-4o-mini
          - openai/gpt-5 # OpenAI GPT-5
          - openai/gpt-5-chat # OpenAI GPT-5-Chat (preview)
          - openai/gpt-5-mini # OpenAI GPT-5-mini (Max size: 4000 tokens)
          - openai/gpt-5-nano # OpenAI GPT-5-nano
          - openai/o1
          - openai/o1-mini
          - openai/o1-preview
          - openai/o3
          - openai/o3-mini
          - openai/o4-mini
          - xai/grok-3
          - xai/grok-3-mini
      prompt:
        description: Prompt to pass to the model
        required: false
        default: Count to 10.
# Prevent concurrent runs on the same branch to avoid push conflicts.
concurrency:
  cancel-in-progress: false
  group: >-
    ai-inference-${{
      github.event.issue.number
      || github.event.pull_request.number
      || github.event.discussion.number
      || (github.ref_name != github.event.repository.default_branch && github.ref)
      || github.run_id
    }}
jobs:
  test:
    name: AI Inference Local
    if: |
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issues' &&
          contains(github.event.issue.body || '', '/ai')
        ) ||
        (
          github.event_name == 'discussion' &&
          contains(github.event.discussion.body || '', '/ai')
        ) ||
        contains(github.event.comment.body || '', '/ai')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Needed so opencode can request an OIDC token for GitHub API calls
      issues: write
      pull-requests: write
      discussions: write
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: >-
            ${{
              (
                github.event_name == 'issue_comment' &&
                github.event.issue.pull_request &&
                format('refs/pull/{0}/head', github.event.issue.number)
              ) ||
              (
                github.event_name == 'pull_request_review_comment' &&
                format('refs/pull/{0}/head', github.event.pull_request.number)
              ) ||
              github.ref
            }}
      - name: Run AI Inference
        uses: ./ai-inference
        with:
          model: ${{ inputs.model || 'openai/gpt-5-mini' }}
          prompt: ${{ inputs.prompt || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}
