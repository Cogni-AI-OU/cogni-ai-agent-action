---
# AI Inference Local workflow — tests the local ai-inference action.
# Triggered manually via workflow_dispatch.
name: AI Inference Local
run-name: 'Agent on #${{ github.event.issue.number || github.event.pull_request.number || github.event.discussion.number || github.run_id }}'
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to pass to the model
        required: false
        default: Count to 10.
jobs:
  test:
    if: ${{ github.event.sender.type != 'Bot' }}
    name: AI Inference Local
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run AI Inference
        uses: ./ai-inference
        with:
          prompt: ${{ inputs.prompt || 'Count to 10.' }}
          token: ${{ secrets.GITHUB_TOKEN }}
