---
name: Test MiniZinc Constraints
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  test-constraints:
    runs-on: ubuntu-latest
    env:
      MINIZINC_VERSION: 2.9.3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install MiniZinc system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Cache MiniZinc bundle
        id: cache-minizinc
        uses: actions/cache@v4
        with:
          path: MiniZincIDE-${{ env.MINIZINC_VERSION }}-bundle-linux-x86_64
          key: minizinc-${{ env.MINIZINC_VERSION }}
      - name: Download MiniZinc bundle
        if: steps.cache-minizinc.outputs.cache-hit != 'true'
        run: |
          wget "https://github.com/MiniZinc/MiniZincIDE/releases/download/${MINIZINC_VERSION}/MiniZincIDE-${MINIZINC_VERSION}-bundle-linux-x86_64.tgz"
          tar xzf "MiniZincIDE-${MINIZINC_VERSION}-bundle-linux-x86_64.tgz"
      - name: Add MiniZinc to PATH
        run: |
          echo "$PWD/MiniZincIDE-${{ env.MINIZINC_VERSION }}-bundle-linux-x86_64/bin" >> "$GITHUB_PATH"
      - name: Verify MiniZinc installation
        run: |
          minizinc --version
          minizinc --solvers
      - name: Run MiniZinc Constraints Check
        run: |-
          minizinc CONSTRAINTS.mzn
