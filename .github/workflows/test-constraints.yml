---
name: Test MiniZinc Constraints
on:
  push:
    branches:
      - main
    paths:
      - CONSTRAINTS.mzn
      - .github/workflows/test-constraints.yml
  pull_request:
    branches:
      - main
    paths:
      - CONSTRAINTS.mzn
      - .github/workflows/test-constraints.yml
  workflow_dispatch:
jobs:
  test-constraints:
    runs-on: ubuntu-latest
    env:
      MINIZINC_VERSION: 2.9.7
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install MiniZinc system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install eget
        run: |
          wget -qO- https://zyedidia.github.io/eget.sh | sh
      - name: Install MiniZinc via eget
        run: |
          ./eget -a bundle-linux-x86_64.tgz --tag ${{ env.MINIZINC_VERSION }} --file '*/bin/minizinc' MiniZinc/MiniZincIDE
      - name: Add MiniZinc to PATH
        run: |
          echo "$PWD" >> "$GITHUB_PATH"
      - name: Verify MiniZinc installation
        run: |
          minizinc --version
          minizinc --solvers
      - name: Run MiniZinc Constraints Check
        run: |-
          minizinc CONSTRAINTS.mzn
