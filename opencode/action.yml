---
# See: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
author: Cogni AI OU
branding:
  color: blue
  icon: cpu
description: Runs OpenCode Agent
inputs:
  agent:
    description: Agent to use.
    required: false
  model:
    default: opencode/gemini-3-flash
    description: Model to use for OpenCode.
    required: false
  mentions:
    default: /oc,/opencode,/review  # Note: Do not change default triggers.
    description: Comma-separated trigger mentions for OpenCode.
    required: false
  opencode-api-key:
    description: API key for OpenCode.
    required: true
  permissions:
    default: |-
      # Keep in alphabetical order.
      default:
        bash: &default-bash
          '*': deny
          awk*: allow
          base64*: allow
          cp*: allow
          docker*: allow
          find*: allow
          gh*: allow
          git*: allow
          glob*: allow
          hexdump*: allow
          jq*: allow
          ls*: allow
          mawk*: allow
          pipenv*: allow
          pipx*: allow
          poetry*: allow
          pre-commit*: allow
          printf*: allow
          sed*: allow
          set*: allow
          stat*: allow
          time*: allow
          timeout*: allow
          touch*: allow
          true*: allow
          vim*: allow
        glob: allow
        read: allow
      cogni-ai-brain-ops:
        bash:
          # Brain-ops is a context-gathering agent; gathering context via GH/git is allowed.
          gh api*: allow
          gh pr checks*: allow
          gh pr view*: allow
          gh run view*: allow
          git log*: allow
          git show*: allow
        glob: allow
        read: allow
        edit: deny
      cogni-ai-code-reviewer:
        bash: deny
        glob: allow
        read: allow
        edit: deny
      cogni-ai-context7-ops:
        bash: deny
        glob: allow
        read: allow
        edit: deny
      cogni-ai-devops:
        bash:
          <<: *default-bash
          ansible*: allow
          molecule*: allow
          pulumi*: allow
          terraform*: allow
        glob: allow
        read: allow
      cogni-ai-fact-ops:
        bash: deny
        glob: allow
        read: allow
        edit: deny
      cogni-ai-github-ops:
        bash:
          <<: *default-bash
          gh api graphql*: allow
          gh issue close*: allow
          gh issue comment*: allow
          gh issue create*: allow
          gh issue delete*: deny
          gh issue edit*: allow
          gh pr close*: allow
          gh pr comment*: allow
          gh pr create*: allow
          gh pr edit*: allow
          gh pr merge*: allow
          gh pr review*: allow
        glob: allow
        read: allow
        edit: deny
      cogni-ai-plan-reviewer:
        bash: deny
        glob: allow
        read: allow
        edit: deny
      cogni-ai-tester:
        bash:
          <<: *default-bash
          molecule*: allow
          npm test*: allow
          pytest*: allow
        glob: allow
        read: allow
    description: |-
      Permissions configuration for OpenCode. Supports hierarchical format
      with 'default' and agent-specific overrides (e.g.,
      'cogni-ai-architect', 'cogni-ai-code-reviewer', 'cogni-ai-tester', etc.).
      Example:
        default:
          bash:
            ls*: allow
    required: false
  prompt:
    default: ''
    description: Prompt to pass to the agent.
    required: false
name: OpenCode Agent
outputs:
  prompt:
    description: The resolved prompt sent to the agent.
    value: ${{ steps.prompt.outputs.prompt }}
  response:
    description: The response from the agent.
    value: ${{ steps.opencode.outputs.response }}
runs:
  using: composite
  steps:
    - name: Check conditions
      id: check
      uses: actions/github-script@v7
      env:
        MENTIONS: ${{ inputs.mentions || '/oc,/opencode,/review' }}
        AGENT_INPUT: ${{ inputs.agent }}
      with:
        script: |
          const TRIGGERS = process.env.MENTIONS.split(',').map(t => t.trim());
          const REVIEW_TRIGGERS = TRIGGERS.filter(t => t.includes('review'));
          const BOT_MENTIONS = ['@opencode-agent', '@OpenCode-Agent'];
          const ALLOWED_ROLES = ['COLLABORATOR', 'CONTRIBUTOR', 'MEMBER', 'OWNER'];
          const REVIEW_ROLES = ['COLLABORATOR', 'MEMBER', 'OWNER'];
          const COPILOT_LOGINS = ['Copilot', 'copilot[bot]', 'copilot-swe-agent'];
          function matchesTrigger(body, triggers) {
            if (!body) return false;
            return triggers.some(t => {
              if (!t) return false;
              // Escape trigger for safe use in RegExp
              const escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              // Match trigger with:
              // - start of string or whitespace / common punctuation before it
              // - end of string or whitespace / common punctuation (incl. newlines) after it
              const pattern = new RegExp(`(^|[\\s,.!?:;\\(\\[])${escaped}(?=$|[\\s,.!?:;\\)\\]])`);
              return pattern.test(body);
            });
          }
          function matchesBotMention(body) {
            if (!body) return false;
            return BOT_MENTIONS.some(m => body.includes(m));
          }
          function getAgent(body) {
            if (!body) return 'cogni-ai-architect';
            // Stricter pattern for /review to avoid misclassification
            if (/(^|\s)\/review\b/.test(body)) return 'cogni-ai-code-reviewer';
            return 'cogni-ai-architect';
          }
          const isBot = context.actor.endsWith('[bot]');
          const eventName = context.eventName;
          let run = false;
          let agent = '';
          console.log(`Event: ${eventName}, Actor: ${context.actor}, IsBot: ${isBot}`);
          if (eventName === 'workflow_dispatch' || eventName === 'workflow_call') {
            run = true;
            agent = 'cogni-ai-architect';
          } else if (['issues', 'issue_comment', 'discussion', 'discussion_comment'].includes(eventName) && !isBot) {
            const payload = context.payload.comment || context.payload.issue || context.payload.discussion;
            const assoc = payload?.author_association;
            const body = payload?.body;
            console.log(`Assoc: ${assoc}, BodyLength: ${body?.length || 0}`);
            const isReviewTrigger = REVIEW_ROLES.includes(assoc) && matchesTrigger(body, REVIEW_TRIGGERS);
            if (isReviewTrigger) {
              run = true;
              agent = 'cogni-ai-code-reviewer';
            } else if (ALLOWED_ROLES.includes(assoc) && (matchesTrigger(body, TRIGGERS) || matchesBotMention(body))) {
              run = true;
              agent = getAgent(body);
            }
          } else if (eventName === 'pull_request_review_comment' && !isBot) {
            const payload = context.payload.comment;
            const assoc = payload?.author_association;
            const body = payload?.body;
            console.log(
              `PR Review Comment - Assoc: ${assoc}, ` +
              `BodyLength: ${body?.length || 0}`
            );
            const isReviewTrigger = REVIEW_ROLES.includes(assoc) && matchesTrigger(body, REVIEW_TRIGGERS);
            if (isReviewTrigger) {
              run = true;
              agent = 'cogni-ai-code-reviewer';
            } else if (ALLOWED_ROLES.includes(assoc) && (matchesTrigger(body, TRIGGERS) || matchesBotMention(body))) {
              run = true;
              agent = getAgent(body);
            }
          } else if (eventName === 'pull_request' || eventName === 'pull_request_target') {
            const pr = context.payload.pull_request;
            const assoc = pr?.author_association;
            const login = pr?.user?.login;
            const isAllowed = (!isBot && ['COLLABORATOR', 'MEMBER', 'OWNER'].includes(assoc)) ||
              (COPILOT_LOGINS.includes(login) && assoc === 'CONTRIBUTOR');
            if (isAllowed) {
              run = true;
              agent = 'cogni-ai-architect';
            }
          }
          core.setOutput('run', run ? 'true' : '');
          core.setOutput('agent', agent);
          // Centralized effective agent logic
          let effectiveAgent = process.env.AGENT_INPUT || agent || 'cogni-ai-architect';
          if (effectiveAgent === 'default') {
            effectiveAgent = '';
          }
          core.setOutput('effective_agent', effectiveAgent);
    - name: Wait for concurrent runs
      if: steps.check.outputs.run == 'true'
      id: concurrency
      uses: actions/github-script@v7
      with:
        script: |
          const eventName = context.eventName;
          const issueOrPREvents = [
            'discussion',
            'discussion_comment',
            'issue_comment',
            'issues',
            'pull_request',
            'pull_request_review_comment',
            'pull_request_target',
          ];
          if (!issueOrPREvents.includes(eventName)) {
            core.info('Concurrency wait: skipped (not an issue/PR event)');
            return;
          }
          const { data: currentRun } = await github.rest.actions.getWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
          });
          const workflowId = currentRun.workflow_id;
          const currentCreatedAt = new Date(currentRun.created_at).getTime();
          const POLL_INTERVAL_MS = 30_000;
          const MAX_WAIT_MS = 20 * 60_000;
          const start = Date.now();
          while (Date.now() - start < MAX_WAIT_MS) {
            let olderActiveRuns = [];
            for (const status of ['in_progress', 'queued']) {
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                status,
              });
              olderActiveRuns.push(
                ...workflow_runs.filter(
                  run => run.id !== context.runId
                    && new Date(run.created_at).getTime() < currentCreatedAt
                    && run.display_title === currentRun.display_title
                )
              );
            }
            if (olderActiveRuns.length === 0) {
              core.info('Concurrency wait: no older active runs, proceeding');
              return;
            }
            const ids = olderActiveRuns.map(r => r.id).join(', ');
            core.info(
              `Concurrency wait: ${olderActiveRuns.length} older run(s) still active ` +
              `(IDs: ${ids}). Waiting ${POLL_INTERVAL_MS / 1000}s...`
            );
            await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
          }
          core.warning(
            `Concurrency wait: timed out after ${MAX_WAIT_MS / 60_000}m waiting ` +
            `for older runs of "${currentRun.display_title}" to finish. Proceeding anyway.`
          );
    - name: Checkout cogni-ai-agents
      if: steps.check.outputs.run == 'true'
      shell: bash
      run: git clone --depth 1 https://github.com/Cogni-AI-OU/cogni-ai-agents.git ${{ runner.temp }}/.agents
    - name: Resolve prompt
      if: steps.check.outputs.run == 'true'
      id: prompt
      shell: bash
      env:
        AGENT: ${{ steps.check.outputs.effective_agent }}
        COMMENT_BODY: >-
          ${{ github.event.comment.body ||
              github.event.issue.body ||
              github.event.pull_request.body ||
              github.event.discussion.body ||
              '' }}
        ISSUE_NUMBER: >-
          ${{ github.event.issue.number ||
              github.event.pull_request.number ||
              github.event.discussion.number ||
              '' }}
        DISCUSSION_NUMBER: ${{ github.event.discussion.number || '' }}
        PROMPT_INPUT: ${{ inputs.prompt }}
      run: |
        set -euo pipefail
        prompt="${PROMPT_INPUT:-}"
        if [ -z "$prompt" ]; then
          prompt="${COMMENT_BODY:-}"
        fi
        if [ -n "${ISSUE_NUMBER:-}" ]; then
          entity_type="issue/PR"
          if [ -n "${DISCUSSION_NUMBER:-}" ]; then
            entity_type="discussion"
          fi
          header="Related to $entity_type #$ISSUE_NUMBER"
          if [ -n "$prompt" ]; then
            prompt=$(printf '%s\n\n%s' "$header" "$prompt")
          else
            prompt="$header"
          fi
        fi
        if [ "${GITHUB_RUN_ATTEMPT:-1}" -gt 1 ]; then
          prev_attempt=$(( GITHUB_RUN_ATTEMPT - 1 ))
          previous_build_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${prev_attempt}"
          rerun_note="Note: This is a re-run of a previous build attempt."
          rerun_note+=" Check the previous attempt to understand what was"
          rerun_note+=" already done and continue from where it left off:"
          rerun_note+=" ${previous_build_url}"
          prompt=$(printf '%s\n\n%s' "$prompt" "$rerun_note")
        fi

        # Prepend agent content if specified and not 'default'
        if [ -n "${AGENT}" ]; then
          agent_file="${{ runner.temp }}/.agents/${AGENT}/${AGENT}.agent.md"
          if [ -f "$agent_file" ]; then
            echo "Prepending agent content from $agent_file"
            agent_content=$(cat "$agent_file")
            prompt=$(printf '%s\n\n%s' "$agent_content" "$prompt")
          fi
        fi

        EOF_TOKEN="EOF_$(openssl rand -hex 10)"
        {
          echo "prompt<<$EOF_TOKEN"
          printf '%s\n' "$prompt"
          echo "$EOF_TOKEN"
        } >> "$GITHUB_OUTPUT"
        echo "::group::Resolved prompt"
        printf '%s\n' "$prompt"
        echo "::endgroup::"
    - name: Convert permissions to JSON
      if: steps.check.outputs.run == 'true'
      id: permissions
      shell: python
      env:
        AGENT_NAME: ${{ steps.check.outputs.effective_agent }}
        PERMISSIONS_YAML: ${{ inputs.permissions }}
      run: |
        import os
        import json
        import yaml
        REPLACE_PERMISSION_MAPS = {'bash', 'skill', 'task'}
        def deep_merge(base, override):
            if not isinstance(base, dict) or not isinstance(override, dict):
                return override
            res = base.copy()
            for k, v in override.items():
                if k in REPLACE_PERMISSION_MAPS and isinstance(v, dict):
                    res[k] = v.copy()
                elif k in res and isinstance(res[k], dict) and isinstance(v, dict):
                    res[k] = deep_merge(res[k], v)
                else:
                    res[k] = v
            return res
        raw_yaml = os.environ.get('PERMISSIONS_YAML', '')
        agent = os.environ.get('AGENT_NAME', 'cogni-ai-architect')
        try:
            permissions = yaml.safe_load(raw_yaml) or {}
        except Exception:
            permissions = {}
        if isinstance(permissions, dict) and ('default' in permissions or agent in permissions):
            base_perms = permissions.get('default', {})
            agent_perms = permissions.get(agent, {})
            if not isinstance(base_perms, dict): base_perms = {}
            if not isinstance(agent_perms, dict): agent_perms = {}
            final_perms = deep_merge(base_perms, agent_perms)
        else:
            final_perms = permissions
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"json={json.dumps(final_perms)}\n")
    - name: Run opencode
      if: steps.check.outputs.run == 'true'
      id: opencode
      uses: anomalyco/opencode/github@v1.4.3
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_EVENT_NAME: ${{ github.event_name == 'pull_request_target' && 'pull_request' || github.event_name }}
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        OPENCODE_PERMISSION: ${{ steps.permissions.outputs.json }}
      with:
        agent: ${{ steps.check.outputs.effective_agent }}
        mentions: ${{ inputs.mentions || '/oc,/opencode,/review' }}
        model: ${{ inputs.model || 'opencode/gemini-3-flash' }}
        prompt: ${{ steps.prompt.outputs.prompt }}
        use_github_token: false
    - name: Write response to summary
      if: always() && steps.opencode.outputs.response != ''
      shell: bash
      env:
        PROMPT: ${{ steps.prompt.outputs.prompt }}
        RESPONSE: ${{ steps.opencode.outputs.response }}
      run: |-
        {
          if [ -n "${PROMPT:-}" ]; then
            echo "## Prompt"
            echo ""
            echo "$PROMPT"
            echo ""
          fi
          echo "## Agent Response"
          echo ""
          echo "$RESPONSE"
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Print logs
      if: cancelled() || failure()
      shell: bash
      run: grep -v INFO ~/.local/share/opencode/log/* || true
