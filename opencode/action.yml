---
# See: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
author: Cogni AI OU
branding:
  color: blue
  icon: cpu
description: Runs OpenCode Agent
env:
  TRIGGER_OC: /oc
  TRIGGER_OPENCODE: /opencode
  TRIGGER_REVIEW: /review
  TRIGGER_AGENT_LOWER: '@opencode-agent'
  TRIGGER_AGENT_MIXED: '@OpenCode-Agent'
inputs:
  agent:
    description: Agent to use.
    required: false
  model:
    default: opencode/gemini-3-flash
    description: Model to use for OpenCode.
    required: false
  mentions:
    default: /oc,/opencode,/review
    description: Comma-separated trigger mentions for OpenCode.
    required: false
  opencode-api-key:
    description: API key for OpenCode.
    required: true
  permissions:
    default: |-
      bash:
        '*': deny
        ansible*: allow
        ansible-galaxy*: allow
        ansible-playbook*: allow
        awk*: allow
        continue*: allow
        cp*: allow
        ex*: allow
        gh*: allow
        gh pr review*: allow  # For batched feedback and setting review states
        git*: allow
        hexdump*: allow
        jq*: allow
        ls*: allow
        links*: allow
        mawk*: allow
        pipx*: allow
        pre-commit*: allow
        printf*: allow
        sed*: allow
        set*: allow
        stat*: allow
        time*: allow
        timeout*: allow
        touch*: allow
        true*: allow
        vim*: allow
    description: Permissions configuration for OpenCode.
    required: false
  prompt:
    default: ''
    description: Prompt to pass to the agent.
    required: false
name: OpenCode Agent
outputs:
  response:
    description: The response from the agent.
    value: ${{ steps.opencode.outputs.response }}
runs:
  using: composite
  steps:
    - name: Prepare environment
      shell: bash
      run: |
        {
          echo "TRIGGER_OC=${TRIGGER_OC}"
          echo "TRIGGER_OPENCODE=${TRIGGER_OPENCODE}"
          echo "TRIGGER_REVIEW=${TRIGGER_REVIEW}"
          echo "TRIGGER_AGENT_LOWER=${TRIGGER_AGENT_LOWER}"
          echo "TRIGGER_AGENT_MIXED=${TRIGGER_AGENT_MIXED}"
        } >> "$GITHUB_ENV"
    - name: Check conditions
      id: check
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        ACTOR: ${{ github.actor }}
        ISSUE_AUTHOR_ASSOC: ${{ github.event.issue.author_association }}
        COMMENT_AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
        PR_AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
        PR_USER_LOGIN: ${{ github.event.pull_request.user.login }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        ISSUE_BODY: ${{ github.event.issue.body }}
        MENTIONS: ${{ inputs.mentions }}
      run: |
        # Returns 0 when the actor name ends with [bot].
        is_bot() { [[ "$ACTOR" == *'[bot]' ]]; }

        # Returns 0 when $1 matches any of the remaining arguments.
        has_assoc() {
          local assoc="$1"; shift
          local a; for a in "$@"; do [[ "$assoc" == "$a" ]] && return 0; done
          return 1
        }

        # Returns 0 when $body contains $trigger followed by a space or at end-of-string.
        body_has_trigger() {
          local body="$1" trigger="$2"
          [[ "$body" == *"${trigger} "* || "$body" == *"$trigger" ]]
        }

        # Strips leading and trailing whitespace from the value in $1.
        trim() { local v="$1"; v="${v#"${v%%[![:space:]]*}"}"; echo "${v%"${v##*[![:space:]]}"}"; }

        # Returns 0 when the body matches any mention from the MENTIONS csv or the @agent handles.
        has_mention() {
          local body="$1" mention
          IFS=',' read -ra mentions <<< "$MENTIONS"
          for mention in "${mentions[@]}"; do
            mention="$(trim "$mention")"
            [[ -n "$mention" ]] && body_has_trigger "$body" "$mention" && return 0
          done
          [[ "$body" == *"$TRIGGER_AGENT_LOWER"* || "$body" == *"$TRIGGER_AGENT_MIXED"* ]]
        }

        run="false"
        case "$EVENT_NAME" in
          workflow_dispatch|workflow_call)
            run="true"
            ;;
          issues)
            if ! is_bot \
               && has_assoc "$ISSUE_AUTHOR_ASSOC" COLLABORATOR CONTRIBUTOR MEMBER OWNER \
               && has_mention "$ISSUE_BODY"; then
              run="true"
            fi
            ;;
          issue_comment)
            if ! is_bot \
               && has_assoc "$COMMENT_AUTHOR_ASSOC" COLLABORATOR CONTRIBUTOR MEMBER OWNER \
               && has_mention "$COMMENT_BODY"; then
              run="true"
            fi
            ;;
          pull_request_review_comment)
            if ! is_bot \
               && has_assoc "$COMMENT_AUTHOR_ASSOC" COLLABORATOR CONTRIBUTOR MEMBER OWNER \
               && has_mention "$COMMENT_BODY"; then
              run="true"
            fi
            ;;
          pull_request|pull_request_target)
            if ! is_bot && has_assoc "$PR_AUTHOR_ASSOC" COLLABORATOR MEMBER OWNER; then
              run="true"
            elif [[ "$PR_USER_LOGIN" =~ ^(Copilot|copilot\[bot\]|copilot-swe-agent)$ ]] \
                 && [[ "$PR_AUTHOR_ASSOC" == "CONTRIBUTOR" ]]; then
              run="true"
            fi
            ;;
        esac

        if [[ "$run" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        fi
    - name: Resolve prompt
      if: steps.check.outputs.run == 'true'
      id: prompt
      shell: bash
      env:
        COMMENT_BODY: >-
          ${{ github.event_name == 'issues' && github.event.issue.body ||
          github.event.comment.body || '' }}
        ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
        PROMPT_INPUT: ${{ inputs.prompt }}
      run: |
        set -euo pipefail
        prompt="${PROMPT_INPUT:-}"
        if [ -z "$prompt" ]; then
          prompt="${COMMENT_BODY:-}"
        fi
        if [ -n "${ISSUE_NUMBER:-}" ]; then
          if [ -n "$prompt" ]; then
            prompt=$(printf 'Related to issue/PR #%s\n\n%s' "$ISSUE_NUMBER" "$prompt")
          else
            prompt="Related to issue/PR #${ISSUE_NUMBER}"
          fi
        fi
        {
          echo 'prompt<<EOF'
          printf '%s\n' "$prompt"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
    - name: Convert permissions to JSON
      if: steps.check.outputs.run == 'true'
      id: permissions
      shell: python
      env:
        PERMISSIONS_YAML: ${{ inputs.permissions }}
      run: |
        import os
        import json
        import yaml
        permissions = yaml.safe_load(os.environ.get('PERMISSIONS_YAML', ''))
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"json={json.dumps(permissions)}\n")
    - name: Run opencode
      if: steps.check.outputs.run == 'true'
      id: opencode
      uses: anomalyco/opencode/github@v1.4.3
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_EVENT_NAME: ${{ github.event_name == 'pull_request_target' && 'pull_request' || github.event_name }}
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        OPENCODE_PERMISSION: ${{ steps.permissions.outputs.json }}
      with:
        agent: ${{ inputs.agent }}
        mentions: ${{ inputs.mentions || '/oc,/opencode,/review' }}
        model: ${{ inputs.model || 'opencode/gemini-3-flash' }}
        prompt: ${{ steps.prompt.outputs.prompt }}
        use_github_token: false
    - name: Write response to summary
      if: always() && steps.opencode.outputs.response != ''
      shell: bash
      env:
        RESPONSE: ${{ steps.opencode.outputs.response }}
      run: |-
        {
          echo "## Agent Response"
          echo ""
          echo "$RESPONSE"
        } >> "$GITHUB_STEP_SUMMARY"
