---
# See: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
author: Cogni AI OU
branding:
  color: blue
  icon: cpu
description: Runs OpenCode Agent
inputs:
  agent:
    description: Agent to use.
    required: false
  model:
    default: opencode/gemini-3-flash
    description: Model to use for OpenCode.
    required: false
  mentions:
    default: /oc,/opencode,/review  # Note: Do not change default triggers.
    description: Comma-separated trigger mentions for OpenCode.
    required: false
  opencode-api-key:
    description: API key for OpenCode.
    required: true
  permissions:
    description: Permissions configuration
    required: false
  prompt:
    default: ''
    description: Prompt to pass to the agent.
    required: false
name: OpenCode Agent
outputs:
  prompt:
    description: The resolved prompt sent to the agent.
    value: ${{ inputs.prompt }}
  response:
    description: The response from the agent.
    value: ${{ steps.opencode.outputs.response }}
runs:
  using: composite
  steps:
    - name: Get opencode version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT
    - name: Cache opencode
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.opencode/bin
        key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}
    - name: Install opencode
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://opencode.ai/install | bash
    - name: Add opencode to PATH
      shell: bash
      run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH
    - name: Run opencode
      id: opencode
      shell: bash
      run: opencode github run
      env:
        AGENT: ${{ inputs.agent }}
        MENTIONS: ${{ inputs.mentions }}
        MODEL: ${{ inputs.model }}
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        OPENCODE_PERMISSION: ${{ inputs.permissions || env.OPENCODE_PERMISSION }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: false
